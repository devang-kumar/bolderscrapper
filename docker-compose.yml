services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bolders}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-job_market}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bolders} -d ${POSTGRES_DB:-job_market}"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build: ./scraper
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bolders}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-job_market}
    volumes:
      - ./scraper:/app

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bolders}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-job_market}
    volumes:
      - ./dashboard:/app

volumes:
  pgdata:
